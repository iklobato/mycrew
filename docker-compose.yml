services:
  webhook:
    build:
      context: .
      dockerfile: Dockerfile
    image: mycrew/webhook:latest
    container_name: mycrew-webhook
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - DEFAULT_DRY_RUN=${DEFAULT_DRY_RUN:-false}
      - DEFAULT_BRANCH=${DEFAULT_BRANCH:-main}
      - PORT=8000
      - HOST=0.0.0.0
      - PYTHONPATH=/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: mycrew/webhook:test
    container_name: mycrew-test
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PYTHONPATH=/app/src
    command: ["pytest", "-x", "tests/"]
