# Taskfile for code_pipeline
#
# Run with parameters (like kickoff flags):
#   task run TASK="add feature" R=./repo
#   task run TASK="fix bug" R=. V=1
#   task run TASK="add auth" R=. DRY_RUN=1
#
# Params: TASK, R (repo), B (branch), V (verbose), F (from-scratch),
#         DRY_RUN, N (retries), TEST, ISSUE_ID, GITHUB_REPO, ISSUE_URL, DOCS

version: "3"

tasks:
  default:
    desc: Show tasks, parameters, and usage examples
    cmds:
      - |
        echo "=== Code Pipeline Tasks ==="
        task --list
        echo ""
        echo "=== Parameters (for task run) ==="
        echo "  CONFIG      Path to YAML config file (all params); use instead of TASK"
        echo "  TASK        Task description (required if no CONFIG)"
        echo "  R           Repository path (default: .)"
        echo "  B           Git branch (default: main)"
        echo "  V           Verbose logging: 1 or 0 (default: 0)"
        echo "  F           From scratch (ignore checkpoint): 1 or 0 (default: 0)"
        echo "  DRY_RUN     Skip git commit: 1 or 0 (default: 0)"
        echo "  N           Max retries (default: 3)"
        echo "  TEST        Test command (e.g. pytest, npm test)"
        echo "  ISSUE_ID    Issue ID for commit (e.g. fixes #42)"
        echo "  GITHUB_REPO GitHub repo owner/repo for search"
        echo "  ISSUE_URL   Issue URL for scraping"
        echo "  DOCS        Docs URL for CodeDocsSearchTool"
        echo ""
        echo "=== Usage Examples ==="
        echo "  # Basic run"
        echo "  task run TASK=\"add a hello world function\""
        echo ""
        echo "  # With repo and verbose"
        echo "  task run TASK=\"fix login bug\" R=/path/to/repo V=1"
        echo ""
        echo "  # Config file (all params in YAML)"
        echo "  task run CONFIG=config.yaml"
        echo ""
        echo "  # Dry run (no commit)"
        echo "  task run TASK=\"add auth\" DRY_RUN=1"
        echo ""
        echo "  # From scratch (ignore checkpoint)"
        echo "  task run TASK=\"add feature\" F=1"
        echo ""
        echo "  # Full example"
        echo "  task run TASK=\"add validation\" R=./my-app B=dev N=5 TEST=pytest ISSUE_ID=\"#42\" V=1"

  run:
    desc: Run the code pipeline. Pass params like TASK=... R=. V=1 or CONFIG=config.yaml
    env:
      CONFIG: "{{.CONFIG}}"
      TASK: "{{.TASK}}"
      R: "{{.R}}"
      B: "{{.B}}"
      F: "{{.F}}"
      N: "{{.N}}"
      DRY_RUN: "{{.DRY_RUN}}"
      TEST: "{{.TEST}}"
      ISSUE_ID: "{{.ISSUE_ID}}"
      GITHUB_REPO: "{{.GITHUB_REPO}}"
      ISSUE_URL: "{{.ISSUE_URL}}"
      DOCS: "{{.DOCS}}"
      V: "{{.V}}"
    cmds:
      - |
        set -e
        CONFIG="${CONFIG:-}"
        TASK="${TASK:-}"
        F="${F:-0}"
        DRY_RUN="${DRY_RUN:-0}"
        V="${V:-0}"
        if [ -n "$CONFIG" ]; then
          R="${R:-}"
          B="${B:-}"
          N="${N:-}"
        else
          R="${R:-.}"
          B="${B:-main}"
          N="${N:-3}"
        fi
        if [ -z "$TASK" ] && [ -z "$CONFIG" ]; then
          echo "Error: TASK or CONFIG is required. Example: task run TASK='your task' R=."
          echo "       Or: task run CONFIG=config.yaml"
          echo "Params: CONFIG (YAML file), TASK, R (repo), B (branch), V (verbose), F (from-scratch),"
          echo "        DRY_RUN, N (retries), TEST, ISSUE_ID, GITHUB_REPO, ISSUE_URL, DOCS"
          exit 1
        fi
        ARGS=()
        [ -n "$CONFIG" ] && ARGS+=(-c "$CONFIG")
        [ -n "$TASK" ] && ARGS+=(-t "$TASK")
        [ -n "$R" ] && ARGS+=(-r "$R")
        [ -n "$B" ] && ARGS+=(-b "$B")
        [ -n "$N" ] && ARGS+=(-n "$N")
        [ "$F" = "1" ] || [ "$F" = "true" ] && ARGS+=(-f)
        [ "$DRY_RUN" = "1" ] || [ "$DRY_RUN" = "true" ] && ARGS+=(--dry-run)
        [ "$V" = "1" ] || [ "$V" = "true" ] && ARGS+=(-v)
        [ -n "$TEST" ] && ARGS+=(--test-command "$TEST")
        [ -n "$ISSUE_ID" ] && ARGS+=(--issue-id "$ISSUE_ID")
        [ -n "$GITHUB_REPO" ] && ARGS+=(--github-repo "$GITHUB_REPO")
        [ -n "$ISSUE_URL" ] && ARGS+=(--issue-url "$ISSUE_URL")
        [ -n "$DOCS" ] && ARGS+=(--docs-url "$DOCS")
        uv run kickoff "${ARGS[@]}"

  run:from-scratch:
    desc: Run from scratch. Pass params like TASK=... R=.
    cmds:
      - task: run
    vars:
      F: "1"

  run:dry:
    desc: Run in dry-run mode. Pass params like TASK=... R=.
    cmds:
      - task: run
    vars:
      DRY_RUN: "1"

  plot:
    desc: Plot the flow diagram
    cmds:
      - uv run plot

  help:
    desc: Show pipeline CLI help
    cmds:
      - uv run kickoff --help
