# Minimal configuration defaults
# Override values in .env for API keys
# All other settings have sensible defaults

# Model configuration (optional - defaults exist if not specified)
models:
  analyze_issue:
    primary: openrouter/deepseek/deepseek-chat
    fallbacks:
      - openrouter/qwen/qwen-2.5-coder-32b-instruct
      - openrouter/mistralai/mistral-small-24b-instruct-2501

  explore:
    primary: openrouter/qwen/qwen-2.5-coder-32b-instruct
    fallbacks:
      - openrouter/deepseek/deepseek-chat
      - openrouter/mistralai/mistral-small-24b-instruct-2501

  plan:
    primary: openrouter/google/gemini-2.0-flash-001
    fallbacks:
      - openrouter/mistralai/mistral-small-24b-instruct-2501
      - openrouter/deepseek/deepseek-chat

  implement:
    primary: openrouter/qwen/qwen-2.5-coder-32b-instruct
    fallbacks:
      - openrouter/deepseek/deepseek-chat
      - openrouter/mistralai/mistral-small-24b-instruct-2501

  review:
    primary: openrouter/deepseek/deepseek-chat
    fallbacks:
      - openrouter/qwen/qwen-2.5-coder-32b-instruct
      - openrouter/mistralai/mistral-small-24b-instruct-2501

  commit:
    primary: openrouter/google/gemini-2.0-flash-001
    fallbacks:
      - openrouter/mistralai/mistral-small-24b-instruct-2501
      - openrouter/deepseek/deepseek-chat

  publish:
    primary: openrouter/google/gemini-2.0-flash-001
    fallbacks:
      - openrouter/mistralai/mistral-small-24b-instruct-2501
      - openrouter/deepseek/deepseek-chat

  auxiliary:
    primary: openrouter/mistralai/mistral-small-24b-instruct-2501
    fallbacks:
      - openrouter/google/gemini-2.0-flash-001
      - openrouter/deepseek/deepseek-chat

  security:
    primary: openrouter/deepseek/deepseek-chat
    fallbacks:
      - openrouter/qwen/qwen-2.5-coder-32b-instruct
      - openrouter/mistralai/mistral-small-24b-instruct-2501

  test_validation:
    primary: openrouter/qwen/qwen-2.5-coder-32b-instruct
    fallbacks:
      - openrouter/deepseek/deepseek-chat
      - openrouter/mistralai/mistral-small-24b-instruct-2501

# Global LLM settings (optional)
settings:
  temperature: 0.7
  max_tokens: 4096

# Feature flags (optional)
features:
  serper:
    enabled: false
    n_results: 5
  tactiq:
    enabled: false

# Provider configuration (optional)
provider: openrouter
