# Code Pipeline Configuration
# ===========================
# Copy to config.yaml and edit. CLI/Task/Docker args override values from this file.
# 
# Usage:
#   task run                          # Uses config.yaml
#   task run CONFIG=other.yaml        # Use custom config
#   uv run kickoff -c config.yaml     # Direct Python execution
#   docker run ... -c config.yaml     # Docker execution

# Core Pipeline Configuration
# ---------------------------
pipeline:
  # Task description or issue to work on
  task: "Add a feature or fix based on the issue"
  
  # Repository path (defaults to current directory)
  repo_path: "."
  
  # Base branch for feature branches
  branch: main
  
  # Start from scratch ignoring previous checkpoints
  from_scratch: false
  
  # Maximum retry attempts for failed implementations
  max_retries: 3
  
  # Dry run mode (no commits, no pushes)
  dry_run: false
  
  # Test command to run (e.g., "pytest", "npm test", "go test ./...")
  test_command: ""
  
  # GitHub issue/PR identifier
  issue_id: ""
  
  # GitHub repository in owner/repo format
  github_repo: ""
  
  # Issue URL for web scraping
  issue_url: ""
  
  # Documentation URL for code documentation search
  docs_url: ""
  
  # Paths to focus on (comma-separated)
  focus_paths: ""
  
  # Paths to exclude (comma-separated)
  exclude_paths: ""

# API Keys and Authentication
# ---------------------------
# Note: For security, these can also be set as environment variables:
#   OPENROUTER_API_KEY, OPENAI_API_KEY, GITHUB_TOKEN, SERPER_API_KEY
api_keys:
  # OpenRouter API key (required for model access)
  openrouter_api_key: ""
  
  # OpenAI API key (alternative to OpenRouter)
  openai_api_key: ""
  
  # GitHub Personal Access Token (for GitHub API access)
  github_token: ""
  
  # Serper API key for web search (optional - enables SerperDevTool)
  serper_api_key: ""

# Logging Configuration
# ---------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # Enable/disable CrewAI telemetry (disabled to avoid SSL issues)
  crewai_telemetry: false

# Model Configuration
# -------------------
# Two-level configuration:
# 1. Stage-level: All agents in a crew use the same model configuration
# 2. Agent-level: Override for specific agents within a crew
models:
  # Issue Analyst Crew
  analyze_issue:
    primary: "openrouter/google/gemini-3-flash-preview"
    fallbacks:
      - "openrouter/deepseek/deepseek-v3.2"
      - "openrouter/deepseek/deepseek-r1"
    # Optional: agent-level overrides
    # agents:
    #   issue_analyst:
    #     primary: "openrouter/google/gemini-3-flash-preview"
    #     fallbacks: ["openrouter/deepseek/deepseek-r1"]
  
  # Explorer Crew
  explore:
    primary: "openrouter/deepseek/deepseek-r1"
    fallbacks:
      - "openrouter/google/gemini-3-flash-preview"
      - "openrouter/deepseek/deepseek-v3.2"
  
  # Architect Crew
  plan:
    primary: "openrouter/google/gemini-3-flash-preview"
    fallbacks:
      - "openrouter/deepseek/deepseek-v3.2"
      - "openrouter/deepseek/deepseek-r1"
  
  # Implementer Crew
  implement:
    primary: "openrouter/deepseek/deepseek-v3.2"
    fallbacks:
      - "openrouter/google/gemini-3-flash-preview"
      - "openrouter/deepseek/deepseek-r1"
  
  # Reviewer Crew
  review:
    primary: "openrouter/deepseek/deepseek-v3.2"
    fallbacks:
      - "openrouter/google/gemini-3-flash-preview"
      - "openrouter/deepseek/deepseek-r1"
  
  # Commit Crew
  commit:
    primary: "openrouter/google/gemini-3-flash-preview"
    fallbacks:
      - "openrouter/deepseek/deepseek-v3.2"
      - "openrouter/deepseek/deepseek-r1"
  
  # Publish stage
  publish:
    primary: "openrouter/google/gemini-3-flash-preview"
    fallbacks:
      - "openrouter/deepseek/deepseek-v3.2"
      - "openrouter/deepseek/deepseek-r1"
  
  # Auxiliary stage (used by various agents)
  auxiliary:
    primary: "openrouter/google/gemini-3-flash-preview"
    fallbacks:
      - "openrouter/deepseek/deepseek-v3.2"
      - "openrouter/deepseek/deepseek-r1"
  
  # Security stage
  security:
    primary: "openrouter/deepseek/deepseek-v3.2"
    fallbacks:
      - "openrouter/google/gemini-3-flash-preview"
      - "openrouter/deepseek/deepseek-r1"

# Tool Configuration
# ------------------
tools:
  # Timeout for shell commands (seconds)
  shell_timeout: 120
  
  # Maximum output length for shell commands (characters)
  shell_max_output: 8000
  
  # Timeout for PR creation (seconds)
  pr_creation_timeout: 30
  
  # Web search configuration (SerperDevTool)
  serper:
    enabled: true  # Enable/disable web search (opt-in for cost control)
    n_results: 5    # Default number of search results
    timeout: 30     # Search timeout in seconds
  
  # Dangerous command patterns to block
  dangerous_patterns:
    - "rm\\s+-rf\\s+/"
    - "rm\\s+-rf\\s+/\\*"
    - "mkfs"
    - "dd\\s+if="
    - ">\\s*/dev/sd"
    - ">\\s*/dev/hd"
    - "chmod\\s+-R\\s+777\\s+/"
    - "shutdown\\s+-"
    - "reboot"

# Agent Behavior Tuning
# ---------------------
agents:
  # Enable verbose agent output
  verbose: false
  
  # Enable agent memory
  memory: false
  
  # Enable output log files
  output_log_file: true