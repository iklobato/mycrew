pipeline:
  issue_url: "https://github.com/precisetargetlabs/monarch/issues/839"
  branch: main
  from_scratch: false
  max_retries: 3
  dry_run: false
  programmatic: false

api_keys:
  openrouter_api_key: "${OPENROUTER_API_KEY}"
  github_token: "${GITHUB_TOKEN}"
  serper_api_key: "${SERPER_API_KEY}"

logging:
  level: "INFO"
  crewai_telemetry: false

models:
  analyze_issue:
    primary: "openrouter/deepseek/deepseek-chat"
    fallbacks:
      - "openrouter/qwen/qwen-2.5-coder-32b-instruct"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

  explore:
    primary: "openrouter/qwen/qwen-2.5-coder-32b-instruct"
    fallbacks:
      - "openrouter/deepseek/deepseek-chat"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

  plan:
    primary: "openrouter/google/gemini-2.0-flash-001"
    fallbacks:
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"
      - "openrouter/deepseek/deepseek-chat"

  implement:
    primary: "openrouter/qwen/qwen-2.5-coder-32b-instruct"
    fallbacks:
      - "openrouter/deepseek/deepseek-chat"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

  review:
    primary: "openrouter/deepseek/deepseek-chat"
    fallbacks:
      - "openrouter/qwen/qwen-2.5-coder-32b-instruct"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

  commit:
    primary: "openrouter/google/gemini-2.0-flash-001"
    fallbacks:
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"
      - "openrouter/deepseek/deepseek-chat"

  publish:
    primary: "openrouter/google/gemini-2.0-flash-001"
    fallbacks:
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"
      - "openrouter/deepseek/deepseek-chat"

  auxiliary:
    primary: "openrouter/mistralai/mistral-small-24b-instruct-2501"
    fallbacks:
      - "openrouter/google/gemini-2.0-flash-001"
      - "openrouter/deepseek/deepseek-chat"

  security:
    primary: "openrouter/deepseek/deepseek-chat"
    fallbacks:
      - "openrouter/qwen/qwen-2.5-coder-32b-instruct"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

  test_validation:
    primary: "openrouter/qwen/qwen-2.5-coder-32b-instruct"
    fallbacks:
      - "openrouter/deepseek/deepseek-chat"
      - "openrouter/mistralai/mistral-small-24b-instruct-2501"

tools:
  serper:
    enabled: false
    n_results: 5
    timeout: 30
    search_depth: "moderate"

agents:
  verbose: false
  memory: false
  output_log_file: true
