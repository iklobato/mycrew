commit_task:
  description: >
    Repository: {repo_path}
    Branch: {branch}
    Dry run: {dry_run}
    Issue ID (include in commit message if provided): {issue_id}

    If issue_id is provided, include "fixes #X" or similar in the commit message.

    If dry_run is "true", do NOT run git commit. List files that would be
    staged and the commit message you would use.
    If dry_run is "false", run: git add -A && git commit -m "your message"

    Commit message should summarize the changes (e.g. "Add user auth" or
    "Fix login validation"). Avoid committing .env, secrets, or large binaries;
    check git status first.
  expected_output: >
    Either the git commit output or a message listing files to stage and
    the proposed commit message (if dry_run).
  agent: git_agent
