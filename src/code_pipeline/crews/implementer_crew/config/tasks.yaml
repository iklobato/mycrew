implement_task:
  description: >
    Task: {task}

    Acceptance criteria from issue (satisfy each): {issue_analysis}

    Plan: {plan}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Follow every guideline above exactly. If a guideline conflicts with the plan,
    surface the conflict as a comment but still follow the guideline.

    {prior_issues}

    Repository path: {repo_path}

    Implement the plan. Satisfy each acceptance criterion.

    SURGICAL CHANGES ONLY: Modify only the files and lines listed in the plan.
    Do not touch other files. Do not add: new abstractions, helpers, logging,
    comments, or optimizations unless explicitly in the plan. Preserve existing
    structure and style. If the plan says "add X", add X—nothing else.

    ## Tools

    - **File Writer Tool** — Params: filename, content, directory (default ./), overwrite (default false).
      Use relative paths. Set overwrite=true to modify existing files.
    - **Repo Shell Tool** — Param: command. Read before write: cat path, head path.
      Run tests: pytest tests/, npm test, cargo test.
    - **Code Interpreter** (if Docker available) — Params: code, libraries_used.
      Run Python snippets for validation. Always print the result.

    Use Repo Shell Tool to read existing files before modifying. Use
    CodeInterpreterTool when useful to validate snippets. Use relative paths
    for all file writes. Run the project's test command and fix failures before finishing.

    If prior_issues above is non-empty, it means a previous implementation was
    rejected. You MUST fix all listed issues before submitting.
  expected_output: >
    Implementation complete. All files created or modified as per the plan.
    Tests must pass.
  agent: implementer
