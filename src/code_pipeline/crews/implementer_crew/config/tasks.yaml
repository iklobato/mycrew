implement_task:
  description: >
    Task: {task}

    Acceptance criteria from issue (satisfy each): {issue_analysis}

    Plan: {plan}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Follow every guideline above exactly. If a guideline conflicts with the plan,
    surface the conflict as a comment but still follow the guideline.

    {prior_issues}

    Repository path: {repo_path}

    ## MANDATORY STEP — You MUST use Repo File Writer Tool

    The plan lists "Files to Create" and "Files to Modify". For EACH file:
    1. Use Repo Shell Tool to read existing content (e.g. cat path) if modifying.
    2. Use Repo File Writer Tool to write the file. Pass: filename (path from plan),
       content (full file content), overwrite=true for existing files.
    You have NOT completed the task until you have invoked Repo File Writer Tool
    for every file in the plan. If the plan lists 3 files, you must call the tool
    3 times. Do not summarize or describe changes — actually write the files.

    SURGICAL CHANGES ONLY: Modify only the files listed in the plan.
    Do not add abstractions, helpers, or improvements beyond the plan.

    ## Tools

    - **Repo File Writer Tool** — REQUIRED. Params: filename (relative path, e.g. src/foo.py),
      content (full file content), overwrite=true when modifying existing files.
      You MUST call this tool for each file in the plan. Paths are relative to {repo_path}.
    - **Repo Shell Tool** — Read files before modifying: cat path, head -100 path.
      Run tests: pytest, npm test.
    - **Code Interpreter** (if Docker available) — Validate snippets. Optional.

    Workflow: Read each file (Repo Shell) → Write/overwrite (Repo File Writer) → Run tests.
    If prior_issues is non-empty, fix those issues before submitting.

    FALLBACK: If the plan above lacks ## Files to Create / ## Files to Modify with paths,
    extract file paths from the clarification (e.g. src/models/tasks.py). Use Repo Shell
    Tool to read each file, then Repo File Writer Tool to write. The clarification often
    mentions exact paths—use them.
  expected_output: >
    List each file written: "Wrote path/to/file.ext: description." Must match
    Repo File Writer Tool invocations. Tests pass.
  agent: implementer
