implement_task:
  description: >
    Task: {task}

    Acceptance criteria from issue (satisfy each): {issue_analysis}

    Plan: {plan}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Follow every guideline above exactly. If a guideline conflicts with the plan,
    surface the conflict as a comment but still follow the guideline.

    {prior_issues}

    Repository path: {repo_path}

    ## MANDATORY STEP — You MUST use Repo File Writer Tool

    The plan lists "Files to Create" and "Files to Modify". For EACH file:
    1. Use Repo Shell Tool to read existing content (e.g. cat path) if modifying.
    2. Use Repo File Writer Tool to write the file. Pass: filename (path from plan),
       content (full file content), overwrite=true for existing files.
    You have NOT completed the task until you have invoked Repo File Writer Tool
    for every file in the plan. If the plan lists 3 files, you must call the tool
    3 times. Do not summarize or describe changes — actually write the files.

    SURGICAL CHANGES ONLY: Modify only the files listed in the plan.
    Do not add abstractions, helpers, or improvements beyond the plan.

    ## Tools

    - **Repo File Writer Tool** — REQUIRED. Params: filename (relative path, e.g. src/foo.py),
      content (full file content), overwrite=true when modifying existing files.
      You MUST call this tool for each file in the plan. Paths are relative to {repo_path}.
    - **Repo Shell Tool** — Read files before modifying: cat path, head -100 path.
      Run tests: pytest, npm test.
    - **Code Interpreter** (if Docker available) — Validate snippets. Optional.

    Workflow: Read each file (Repo Shell) → Write/overwrite (Repo File Writer) → Run tests.
    If prior_issues is non-empty, fix those issues before submitting.

    FALLBACK: If the plan above lacks ## Files to Create / ## Files to Modify with paths,
    extract file paths from the clarification (e.g. src/models/tasks.py). Use Repo Shell
    Tool to read each file, then Repo File Writer Tool to write. The clarification often
    mentions exact paths—use them.
  expected_output: >
    List each file written: "Wrote path/to/file.ext: description." Must match
    Repo File Writer Tool invocations. Tests pass.
  agent: implementer

docstring_write_task:
  description: >
    Add docstrings to new/changed code. You receive implementation from implement_task.

    Plan: {plan}
    Repository: {repo_path}

    Use Repo Shell to read changed files (git diff --name-only). For each
    Python/JS file with new functions/classes, add docstrings. Use Repo
    File Writer Tool. Output "Docstrings added: (list)."
  expected_output: >
    Implementation summary + docstrings added.
  agent: docstring_writer
  context: [implement_task]

type_hint_task:
  description: >
    Add type hints to Python files. You receive output from docstring_write_task.

    Plan: {plan}
    Repository: {repo_path}

    For each changed .py file, ensure type hints on def/async def. Use
    Repo File Writer Tool. Skip non-Python. Output "Type hints: (list)."
  expected_output: >
    Previous output + type hints updated.
  agent: type_hint_checker
  context: [docstring_write_task]

test_write_task:
  description: >
    Add or update tests. You receive the implementation output from type_hint_task.

    Plan: {plan}
    Repository: {repo_path}
    Test command: {test_command}
    Exploration (Test Layout): {exploration}

    If test_command is empty, output "Test write skipped (no test_command)."

    Otherwise: The plan lists test files (e.g. tests/test_foo.py). For each
    test file in the plan, use Repo Shell to read existing tests, then Repo
    File Writer Tool to add/update tests. Run {test_command} to verify.

    Output the implementation summary + "Tests written: (list)."
  expected_output: >
    Implementation summary with tests written, or skip message.
  agent: test_writer
  context: [type_hint_task]

lint_fix_task:
  description: >
    Run linter and auto-fix. You receive output from test_write_task.

    Repository: {repo_path}
    Exploration (Lint & Format): {exploration}

    Use Repo Shell: run black ., ruff check --fix ., eslint --fix ., etc.
    based on what the exploration found. Fix auto-fixable issues. Output
    "Lint fixes applied." or "No linter configured."
  expected_output: >
    Previous output + lint status.
  agent: lint_fixer
  context: [test_write_task]

self_review_task:
  description: >
    Self-review before submit. You receive the full implementation output from lint_fix_task.

    Plan: {plan}
    Repository: {repo_path}

    Use Repo Shell Tool: git status, git diff --name-only. Verify:
    1. Only files from the plan were modified
    2. Every file in "Files to Create" and "Files to Modify" was touched
    3. No unplanned files

    Output SELF_REVIEW: PASS if clean. If issues: SELF_REVIEW: ISSUES:- (list).

    Then output the complete implementation summary (from previous task).
  expected_output: >
    SELF_REVIEW status + full implementation summary.
  agent: self_reviewer
  context: [lint_fix_task]
