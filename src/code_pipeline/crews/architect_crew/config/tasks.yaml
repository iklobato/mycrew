plan_task:
  description: >
    Given the task, issue analysis, and exploration:

    Task: {task}

    Issue analysis with acceptance criteria: {issue_analysis}

    Exploration: {exploration}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Treat every answer above as a hard constraint. Do not deviate from it.

    PRIOR ISSUES TO FIX (from previous attempt — human flagged these):
    {prior_issues}

    ## Tools

    - **GithubSearchTool** — Params: search_query, content_types. Semantic search.
      Find similar past implementations in the repo.
    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs.
      Reference architecture docs, conventions.
    - **Repo Shell Tool** — Param: command. Read files: cat path, head -50 path.
      Confirm paths exist: ls dir, find . -name "*.py".

    Produce a file-level implementation plan. Map your plan to the acceptance
    criteria above. Use GithubSearchTool to find similar implementations.
    Use CodeDocsSearchTool to reference architecture docs.
    Use Repo Shell Tool to read relevant source files and confirm paths. MINIMUM CHANGES: Only
    list files and changes strictly needed for the acceptance criteria.
    Prefer editing existing code over adding new modules. One targeted change
    per criterion when possible. Do not add speculative improvements. Do NOT
    write any code. Only describe what to add or change. Use Repo Shell Tool
    to confirm paths exist before listing them.

    Use this exact structure:
    ## Files to Create
    (path + brief description for each)
    ## Files to Modify
    (path + list of changes for each)
    ## Order
    (if dependencies matter, list the order to implement)
  expected_output: >
    A file-level plan with sections: Files to Create, Files to Modify, Order.
    No code. Only descriptions of changes.
  agent: architect
