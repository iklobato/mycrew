plan_task:
  description: >
    Given the task, issue analysis, and exploration:

    Task: {task}

    Issue analysis with acceptance criteria: {issue_analysis}

    Exploration: {exploration}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Treat every answer above as a hard constraint. Do not deviate from it.

    PRIOR ISSUES TO FIX (from previous attempt — human flagged these):
    {prior_issues}

    ## Tools

    - **GithubSearchTool** — Params: search_query, content_types. Semantic search.
      Find similar past implementations in the repo.
    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs.
      Reference architecture docs, conventions.
    - **Repo Shell Tool** — Param: command. Read files: cat path, head -50 path.
      Confirm paths exist: ls dir, find . -name "*.py".

    CRITICAL: Your output MUST include ## Files to Create and ## Files to Modify with
    concrete file paths. Do NOT respond with "I will explore" or intent—call Repo Shell
    Tool first (ls, find, cat) to gather structure, THEN output the plan.

    Produce a file-level implementation plan. Use Repo Shell Tool to read source files
    and confirm paths. Extract paths from exploration and clarifications if present.
    MINIMUM CHANGES: Only list files strictly needed. Prefer modifying over creating.

    Use this exact structure (paths must be usable by Repo File Writer Tool):
    ## Files to Create
    - path/to/newfile.py: description of what to add
    ## Files to Modify
    - path/to/existing.py: list changes (add X at line N, replace Y with Z)
    ## Order
    Implement in this order if dependencies exist.

    Each path must be a valid relative path (e.g. src/module.py, tests/test_foo.py).
  expected_output: >
    File-level plan with "Files to Create" and "Files to Modify" sections.
    One file path per bullet. No code. Exact paths only.
  agent: architect
