plan_task:
  description: >
    Given the task, issue analysis, and exploration:

    Task: {task}

    Issue analysis with acceptance criteria: {issue_analysis}

    Exploration: {exploration}

    Produce a file-level implementation plan. Map your plan to the acceptance
    criteria above. Use GithubSearchTool to find similar past implementations
    in the repo. Use CodeDocsSearchTool to reference architecture docs.
    Use FileReadTool to read relevant source files. MINIMUM CHANGES: Only
    list files and changes strictly needed for the acceptance criteria.
    Prefer editing existing code over adding new modules. One targeted change
    per criterion when possible. Do not add speculative improvements. Do NOT
    write any code. Only describe what to add or change. Use Repo Shell Tool
    to confirm paths exist before listing them.

    Use this exact structure:
    ## Files to Create
    (path + brief description for each)
    ## Files to Modify
    (path + list of changes for each)
    ## Order
    (if dependencies matter, list the order to implement)
  expected_output: >
    A file-level plan with sections: Files to Create, Files to Modify, Order.
    No code. Only descriptions of changes.
  agent: architect
