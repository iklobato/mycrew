explore_task:
  description: >
    Explore the repository at {repo_path}.

    Issue context (use to focus exploration): {issue_analysis}

    Focus exploration on areas relevant to the issue. Do not exhaustively
    document the entire codebase—only what is needed for the plan.

    ## Tools

    - **Repo Shell Tool** — Param: command. Runs shell in repo. Use: ls -la,
      find src -name "*.py", cat pyproject.toml, head -50 path/to/file, grep -r "pattern" src.
      Read-only preferred. Lists structure, reads configs (package.json, pyproject.toml).

    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs_url.
      Use for framework conventions, architecture docs, coding standards.

    Use Repo Shell Tool to list structure and read files. Use CodeDocsSearchTool
    for documentation and conventions.

    Example: Read package.json, pyproject.toml, key source files. Use
    CodeDocsSearchTool for framework-specific conventions.

    Produce your summary with these exact sections:
    ## Tech Stack
    ## Directory Layout
    ## Key Files
    ## Conventions
  expected_output: >
    A structured repo summary with sections: Tech Stack, Directory Layout,
    Key Files, Conventions. Each section must be present.
  agent: repo_explorer
