review_task:
  description: >
    Review the implementation for the task: {task}

    Acceptance criteria (verify each is satisfied): {issue_analysis}

    Plan:
    {plan}

    Implementation summary:
    {implementation}

    Use the Repo Shell Tool to read changed files and run tests if applicable.

    For each acceptance criterion, confirm it is satisfied. Verify:
    (1) All planned files created/modified
    (2) Changes match the plan
    (3) Code follows project conventions
    (4) No obvious bugs
    (5) No overengineering: changes are minimal and match the plan; no extra
        features, refactors, or speculative improvements

    If the implementation does more than the plan requires (extra files,
    abstractions, features), output ISSUES: listing the excess changes.

    Your output MUST start with exactly one of:
    - APPROVED
    - ISSUES:

    If ISSUES:, each issue MUST be: - <file_path>: <concise description>
    so the implementer can fix them.
  expected_output: >
    First line is exactly APPROVED or ISSUES:. If ISSUES:, each subsequent
    line is "- <file_path>: <description>".
  agent: reviewer
