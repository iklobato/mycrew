analyze_task:
  description: >
    Parse the following issue card into structured requirements:

    {task}

    When the task contains a URL (e.g. GitHub issue, Jira, Linear), use
    ScrapeWebsiteTool to fetch the full issue content. When github_repo is
    available, use GithubSearchTool to find related issues or similar past
    implementations.

    Extract and produce output with these exact sections:
    ## Summary
    (one-line description)
    ## Acceptance Criteria
    1. (first criterion)
    2. (second criterion)
    ...
    ## Scope
    (in-scope vs out-of-scope)
    ## Technical Hints
    (suggested areas, modules, or patterns if mentioned)

    Keep acceptance criteria minimal. Do not add criteria beyond what
    the issue explicitly states.
  expected_output: >
    A structured document with sections: Summary, Acceptance Criteria,
    Scope, Technical Hints. Acceptance criteria must be numbered.
  agent: issue_analyst
