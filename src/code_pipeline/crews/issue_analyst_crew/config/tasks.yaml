analyze_task:
  description: >
    Parse the following issue card into structured requirements:

    ## Provided context
    - Repository: {repo_path}
    - Branch: {branch}
    - Test command (if set): {test_command}
    - Docs URL (if set): {docs_url}

    ## Task
    {task}

    ## Tools

    - **ScrapeWebsiteTool** — Param: website_url. Fetches URL content (HTML→text).
      Use when task contains a URL (GitHub issue, Jira, etc.) to fetch full content.

    - **GithubSearchTool** — Params: search_query, content_types=[code,repo,pr,issue].
      Semantic search over repo. Finds similar implementations. Not gh CLI.

    - **Repo Shell Tool** — Param: command. Runs shell in repo. Use for gh CLI
      when {github_repo} is set. Add `-R "{github_repo}"` to all gh commands.
      Use --state=all (not -s all) to avoid parsing errors. Shell examples:
      ls -la, find src -name "*.py", cat path, head -30 file.

    SIMILAR CARDS (when {github_repo} is available):
    - Run: gh issue list -R "{github_repo}" --state=all -L 30 (or add -S "search query"
      with keywords from the task to find related issues)
    - For relevant issues, run: gh issue view <number> -R "{github_repo}" to read
      scope and acceptance criteria
    - Use patterns from similar issues to infer scope boundaries (what was
      included vs explicitly excluded)

    COMPANY MOMENT (when {github_repo} is available):
    - Run: gh pr list -R "{github_repo}" --state=merged -L 15 (recently shipped work)
    - Run: gh issue list -R "{github_repo}" --state=open -L 20 (current open work)
    - Optionally: gh api "repos/{github_repo}/milestones" for active milestones
    - Synthesize recent focus and merged areas to avoid scope creep

    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs.
      When docs_url is provided, use to search roadmap, priorities, or conventions.

    Extract and produce output with these exact sections (include Context when
    github_repo or docs_url was used):

    ## Context (when github_repo or docs available)
    - Similar issues consulted: #N (one-line), #M (one-line)
    - Closed as out-of-scope in similar issues: (brief list)
    - Recent merges / company moment: (brief summary)

    ## Summary
    (one-line description)

    ## Acceptance Criteria
    1. (first criterion)
    2. (second criterion)
    ...

    ## Scope
    - In-scope: Derived from task + similar cards (what comparable issues
      included). Be specific.
    - Out-of-scope: Derived from task + similar cards (what was explicitly
      excluded) + company moment (avoid scope creep given current focus). Be
      specific.

    ## Technical Hints
    (suggested areas, modules, or patterns if mentioned. When test_command is
    set, include that tests must pass—e.g. "pytest must pass" or "npm test must pass".)

    Keep acceptance criteria minimal. Do not add criteria beyond what the
    issue explicitly states. When gh commands fail (e.g. not authenticated),
    proceed without similar cards and company moment; Scope stays task-only.
  expected_output: >
    A structured document with sections: Context (optional, when data available),
    Summary, Acceptance Criteria, Scope, Technical Hints. Scope must include
    explicit In-scope and Out-of-scope derived from task, similar cards, and
    company moment when available. Acceptance criteria must be numbered.
  agent: issue_analyst
