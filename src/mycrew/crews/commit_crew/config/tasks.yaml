commit_task:
  description: >
    Context:
    {repo_context}

    Base branch (branch from): {branch}
    Feature branch (create and commit to): {feature_branch}
    Dry run: {dry_run}
    Issue ID (include in commit message if provided): {issue_id}

    ## Tools

    - **Repo Shell Tool** — Param: command. Run git: git checkout, git add, git commit.
      Check status: git status. Commands run with cwd=repo_path.

    Create a proper feature branch for this task. The feature branch name is provided: {feature_branch}
    
    Steps:
    1. git stash -u  (stash all changes including untracked files)
    2. git checkout {branch}  (ensure we're on base branch)
    3. git checkout -b {feature_branch}  (create and switch to feature branch)
    4. git stash pop  (apply stashed changes to new branch)
    
    If conflicts occur at step 4:
    - Run git status to see conflicting files
    - For each conflict, open the file and look for <<< === >>> markers
    - Keep your changes (the stashed changes), remove conflict markers
    - Run git add <file> for each resolved file
    - Continue with git stash drop
    
    5. git add -A && git reset -- .code_pipeline
    6. git commit -m "your message"

    Exclude .code_pipeline from the commit (pipeline state, not application code).
    If issue_id is provided, include "fixes #X" or similar in the commit message.

    If dry_run is "true", do NOT run git commands. List: the feature branch
    you would create, files that would be staged, and the commit message.
    If dry_run is "false", run the steps above.

    ALWAYS use Conventional Commits format for the commit message:
      <type>[optional scope]: <description>

    Conventions:
      - feat: new feature
      - fix: bug fix  
      - docs: documentation only
      - style: formatting, whitespace, no code change
      - refactor: code change that neither fixes nor adds a feature
      - test: adding or updating tests
      - chore: maintenance, deps, tooling
      - perf: performance improvement
      - ci: CI config or scripts

    **Branch Naming Examples (already provided in {feature_branch}):**
    - feat/user-authentication: For adding user auth feature
    - fix/login-page-crash: For fixing login page issues
    - docs/update-readme: For documentation updates
    - refactor/database-layer: For code refactoring
    - test/auth-unit-tests: For adding tests
    - chore/update-dependencies: For maintenance tasks
    - perf/query-optimization: For performance improvements
    - ci/github-actions: For CI/CD changes

    **Commit Message Examples:**
    - "feat(auth): add login form with email/password"
    - "fix(api): handle null response in user endpoint"
    - "docs: update README with installation instructions"
    - "refactor(utils): simplify validation logic"
    - "test(auth): add unit tests for login function"
    - "chore: update dependencies to latest versions"
    - "perf(db): optimize user query performance"
    - "ci: add GitHub Actions workflow for tests"

    Avoid committing .env, secrets, or large binaries; check git status first.
  expected_output: >
    Either the git commit output (including the new branch name) or a message
    listing the feature branch, files to stage, and proposed commit message (if dry_run).
  agent: git_agent

commit_message_review_task:
  description: >
    Validate the last commit message follows Conventional Commits format.

    Context: {repo_context}
    Dry run: {dry_run}

    Use Repo Shell Tool: git log -1 --format=%B to read the last commit message.

    Conventional Commits: <type>[optional scope]: <description>
    Types: feat, fix, docs, style, refactor, test, chore, perf, ci.

    If the message is invalid (wrong format, unclear type, etc.):
    - If dry_run is "true", output the issue and a suggested corrected message.
    - If dry_run is "false", run git commit --amend -m "corrected message".

    If valid, output "Commit message valid: <message>".
  expected_output: >
    Either "Commit message valid: ..." or the amended message / suggested fix.
  agent: commit_message_reviewer
  context: [commit_task]

changelog_task:
  description: >
    Update CHANGELOG if it exists. You receive output from commit_message_review_task.

    Context: {repo_context}
    Task: {task}
    Dry run: {dry_run}

    If dry_run is "true", output "Changelog skipped (dry_run)."

    Use Repo Shell Tool: ls CHANGELOG.md CHANGELOG.rst 2>/dev/null; cat CHANGELOG.md.

    If CHANGELOG.md or CHANGELOG.rst exists:
    1. Read current content
    2. Append: ## [Unreleased] or ### YYYY-MM-DD, then "- (summary from task)"
    3. Use Repo File Writer Tool to write the updated file
    4. git add CHANGELOG.* && git commit -m "docs: update CHANGELOG"

    If no CHANGELOG file, output "Changelog skipped (no CHANGELOG file)."
  expected_output: >
    Changelog update confirmation or skip message.
  agent: changelog_agent
  context: [commit_message_review_task]

pr_labels_suggest_task:
  description: >
    Suggest GitHub PR labels from the task and plan.

    Task: {task}
    Plan: {plan}

    Analyze the task description and plan. Suggest 1–5 relevant labels.
    Common labels: feat, fix, docs, refactor, test, chore, dependencies,
    breaking-change, enhancement, bug. Output a single line:

    Suggested labels: label1, label2, label3

    Use lowercase, hyphen for multi-word (e.g. breaking-change).
  expected_output: >
    A line: Suggested labels: label1, label2, ...
  agent: pr_labels_suggester
  context: [changelog_task]

publish_task:
  description: >
    After the commit is done, publish the branch and create a PR. First analyze
    and resolve any conflicts with the base branch using the whole implementation
    context.

    Context: {repo_context}
    Dry run: {dry_run}
    Feature branch: {feature_branch}
    Base branch: {branch}
    Task: {task}
    Implementation: {implementation}
    Plan: {plan}
    Review_verdict: {review_verdict}

    Steps:
    1. Check for conflicts: git fetch origin {branch} && git merge-base origin/{branch} HEAD
    2. If conflicts exist or branch diverged significantly, analyze using the
       implementation context and resolve intelligently
    3. Merge or rebase as appropriate to ensure clean integration
    4. Run tests if test_command is available
    5. If dry_run is "true" OR github_repo is empty, do NOT call the Create PR Tool.
       Output: "PR creation skipped (dry_run)" or "PR creation skipped (no github_repo)".
    6. If dry_run is "false" AND github_repo is set, you MUST use the Create PR Tool
       with these exact parameters:
         - feature_branch: {feature_branch}
         - base_branch: {branch}
         - task: {task}
         - implementation: {implementation}
         - plan: {plan}
         - review_verdict: {review_verdict}
         - issue_url: {issue_url}
         - issue_id: {issue_id}
         - github_repo: {github_repo}

    The tool will push the branch to origin and create the PR with a good description.
    When pr_labels_suggest_task provides a "Suggested labels:" line, extract the
    comma-separated labels and pass them to the Create PR Tool.

    Return the PR URL from the tool output.
  expected_output: >
    The PR URL (e.g. https://github.com/owner/repo/pull/123) or a skip message.
  agent: publish_agent
  context: [changelog_task, pr_labels_suggest_task]
