plan_task:
  description: >
    Given the task, issue analysis, and exploration:

    ## Context
    {repo_context}

    Task: {task}

    Issue analysis with acceptance criteria: {issue_analysis}

    Exploration: {exploration}

    CLARIFICATIONS & DEVELOPMENT GUIDELINES (authoritative — override any assumption):
    {clarifications}
    Treat every answer above as a hard constraint. Do not deviate from it.

    PRIOR ISSUES TO FIX (from previous attempt — human flagged these):
    {prior_issues}

    When test_command is set, ensure the plan includes test file paths (e.g.
    tests/test_foo.py for pytest) and that changes will be validated by that
    command. Use the exploration's Conventions section for test layout.

    ## Tools

    - **GithubSearchTool** — Params: search_query, content_types. Semantic search.
      Find similar past implementations in the repo.
    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs.
      Reference architecture docs, conventions.
    - **Repo Shell Tool** — Param: command. Read files: cat path, head -50 path.
      Confirm paths exist: ls dir, find . -name "*.py".
      
      IMPORTANT - Always limit command output:
      - find: always use --maxdepth 3 (e.g. find . --maxdepth 3 -name "*.py")
      - grep: always use --exclude-dir (e.g. grep -r "pattern" src --exclude-dir=node_modules --exclude-dir=.git)
      - Always add | head -N to limit output
      
      To extract a specific function from a file:
      - grep -A 15 'def function_name' path/to/file.py (shows function + 15 lines)
      - sed -n '/def function_name/,/^def /p' path/to/file.py (extract until next def)
      - Do NOT pipe multiple grep -v filters — extract directly instead
      
      To discover files, use ls:
      - ls .github/workflows/ to see available workflow files
      - ls path/to/directory to see contents
      - Do NOT guess filenames with multiple || cat attempts

    CRITICAL: Your output MUST include ## Files to Create and ## Files to Modify with
    concrete file paths. Do NOT respond with "I will explore" or intent—call Repo Shell
    Tool first (ls, find, cat) to gather structure, THEN output the plan.

    Produce a file-level implementation plan. Use Repo Shell Tool to read source files
    and confirm paths. Extract paths from exploration and clarifications if present.
    MINIMUM CHANGES: Only list files strictly needed. Prefer modifying over creating.

    Use this exact structure (paths must be usable by Repo File Writer Tool):
    ## Files to Create
    - path/to/newfile.py: description of what to add
    ## Files to Modify
    - path/to/existing.py: list changes (add X at line N, replace Y with Z)
    ## Order
    Implement in this order if dependencies exist.

    Each path must be a valid relative path (e.g. src/module.py, tests/test_foo.py).
  expected_output: >
    File-level plan with "Files to Create" and "Files to Modify" sections.
    One file path per bullet. No code. Exact paths only.
  agent: architect

dependency_order_task:
  description: >
    Order the plan by dependency. You receive the plan from plan_task.

    Context:
    {repo_context}

    Exploration (for Dependency Map): {exploration}

    Use Repo Shell Tool: grep imports, cat key files. Determine which files
    must be created/modified first (e.g. models before views).

    APPEND to the plan:
    ## Order (verified)
    (numbered list: implement in this order)
    ## Risk
    (brief: high-risk areas, e.g. "auth/", "no existing tests")

    Output the COMPLETE plan with your appended sections. Fix ## Order if wrong.
  expected_output: >
    Full plan with verified ## Order and ## Risk sections.
  agent: dependency_orderer
  context: [plan_task]

refactor_guard_task:
  description: >
    Check the plan for unnecessary refactors. You receive the full plan.

    Task: {task}
    Acceptance criteria: {issue_analysis}

    Does the plan add anything beyond what acceptance criteria require?
    - Extra abstractions, helpers, "improvements"?
    - Files not needed for the criteria?
    - Refactors that are out of scope?

    If clean, append "## Refactor Guard\nNONE".

    If issues, append "## Refactor Guard\nREFACTOR_FLAGS:\n- (list each excess)".

    Output the COMPLETE plan with your appended section.
  expected_output: >
    Full plan with ## Refactor Guard section.
  agent: refactor_guard
  context: [dependency_order_task]

test_plan_task:
  description: >
    Add test plan when test_command is set. You receive the full plan.

    Context:
    {repo_context}

    Exploration (Test Layout): {exploration}

    If test_command is empty, append "## Test Plan\nSkipped (no test_command)."

    Otherwise APPEND:
    ## Test Plan
    - Files to add/update: (list)
    - What to cover: (per file)
    - Follow: (from Test Layout)

    Output the COMPLETE plan.
  expected_output: >
    Full plan with ## Test Plan section.
  agent: test_plan_advisor
  context: [refactor_guard_task]

migration_check_task:
  description: >
    Flag migration steps. You receive the full plan.

    Task: {task}
    Plan: (from previous task)

    Does the plan touch DB, schema, config, env vars?
    If yes, APPEND:
    ## Migration
    - (steps: migrations, env, feature flags)

    If no, append "## Migration\nNONE".

    Output the COMPLETE plan.
  expected_output: >
    Full plan with ## Migration section.
  agent: migration_checker
  context: [test_plan_task]

rollback_plan_task:
  description: >
    Add rollback section for high-risk changes. You receive the full plan.

    Use ## Risk section from the plan. If high-risk areas exist, APPEND:
    ## Rollback
    - (brief: how to revert, e.g. git revert, rollback migration)

    If low risk, append "## Rollback\nNONE".

    Output the COMPLETE plan.
  expected_output: >
    Full plan with ## Rollback section.
  agent: rollback_planner
  context: [migration_check_task]
