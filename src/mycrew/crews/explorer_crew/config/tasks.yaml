explore_task:
  description: >
    Explore the repository. Focus on areas relevant to the issue.

    Context:
    {repo_context}
    - Focus paths (if set): {focus_paths}
    - Exclude paths (if set): {exclude_paths}

    Issue context (use to focus exploration): {issue_analysis}

    When focus_paths is set,
    prioritize exploring those paths. When exclude_paths is set, avoid spending
    time on them. Do not exhaustively document the entire codebase—only what is
    needed for the plan.
    
    **IMPORTANT: Avoid memory-intensive commands on large repositories.**
    - Use `--include` and `--exclude-dir` flags with grep
    - Limit output with `| head -N`
    - Search specific directories (src/, app/) not entire repository (.)
    - Output is limited to 64KB - excessive output will be truncated

    Run `git log -5 --name-only` to identify recently changed files; include them
    in Key Files when relevant. When test_command is set, document the test
    layout (e.g. tests/ with pytest, or test_*.py next to source) and the test
    command in Conventions. When github_repo is set, consider checking
    CONTRIBUTING.md, ARCHITECTURE.md, or README for project conventions.

    ## Tools

    - **Repo Shell Tool** — Param: command. Runs shell in repo. 
      
      **Directory listing - use these commands:**
      - Use `ls` NOT `ls -la` (shorter output, no permission/size columns)
      - Use `ls -R` for recursive but still concise
      - Use `tree -L 2` if available
      
      **File reading:**
      - find src -name "*.py", cat pyproject.toml, head -50 path/to/file, grep -r "pattern" src,
      - git log -5 --name-only. Read-only preferred.
      
      **IMPORTANT - NEVER scan the entire repository with "." - THIS WILL HANG/TIMEOUT:**
      - NEVER use: grep -r "pattern" . (will timeout!)
      - ALWAYS use a specific directory: grep -r "pattern" src/
      - NEVER use: find . -name (will scan everything)
      - ALWAYS use: find src/ -name or find . --maxdepth 3 -name
      - Example: grep -r "test_command" src/ --include="*.py" | head -20
      
      **For large repositories, use focused commands to avoid memory issues:**
      - `grep -r "pattern" src --include="*.py" --exclude-dir=node_modules --exclude-dir=.git | head -100`
      - `find . -maxdepth 3 -name "*.py" -exec grep -l "pattern" {} \; | head -50`
      - `grep -r "def " src --include="*.py" | head -50` (not `grep -r 'def ' .`)
      
      To extract a specific function from a file:
      - grep -A 15 'def function_name' path/to/file.py (shows function + 15 lines)
      - sed -n '/def function_name/,/^def /p' path/to/file.py (extract until next def)
      - Do NOT pipe multiple grep -v filters — extract directly instead
      
      To discover files, use ls:
      - ls .github/workflows/ to see available workflow files
      - ls path/to/directory to see contents
      - Do NOT guess filenames with multiple || cat attempts

    - **CodeDocsSearchTool** — Param: search_query. Semantic search over docs_url.
      Use for framework conventions, architecture docs, coding standards.

    Produce your summary with these exact sections:
    ## Tech Stack
    ## Directory Layout
    ## Key Files
    ## Conventions
  expected_output: >
    A structured repo summary with sections: Tech Stack, Directory Layout,
    Key Files, Conventions. Each section must be present.
  agent: repo_explorer

dependency_analyze_task:
  description: >
    Analyze dependencies. You receive the full exploration from explore_task.

    Context:
    {repo_context}

    Issue context: {issue_analysis}

    Use Repo Shell Tool:
    - grep -r "import" or "from" in relevant paths
    - cat pyproject.toml, package.json, requirements.txt, go.mod
    - find import/require statements for key files

    APPEND a new section to the exploration document (keep all prior content):

    ## Dependency Map
    - For each key module: what depends on it, what it depends on
    - Blast radius: which areas would be affected by changes

    Output the COMPLETE document: original exploration + your new section.
  expected_output: >
    Full exploration document with appended ## Dependency Map section.
  agent: dependency_analyzer
  context: [explore_task]

test_layout_task:
  description: >
    Document the test layout. You receive the full exploration from the previous task.

    Context:
    {repo_context}

    If test_command is empty, append "## Test Layout\nSkipped (no test_command)."

    Otherwise use Repo Shell Tool:
    - find tests, test_*.py, __tests__, *.test.*
    - cat conftest.py, pytest.ini, jest.config, package.json scripts
    - Check how fixtures and mocks are used

    APPEND to the document:
    ## Test Layout
    - Directory structure, how to run, fixtures, how to add a new test

    Output the COMPLETE document: all prior sections + ## Test Layout.
  expected_output: >
    Full exploration document with appended ## Test Layout section.
  agent: test_layout_scout
  context: [dependency_analyze_task]

convention_extract_task:
  description: >
    Extract lint and format config. You receive the full exploration.

    Context:
    {repo_context}

    Use Repo Shell Tool:
    - cat pyproject.toml (sections [tool.black], [tool.ruff], [tool.pytest])
    - cat .eslintrc .eslintrc.json .prettierrc package.json 2>/dev/null
    - ls -la .*rc* pyproject.toml

    APPEND:
    ## Lint & Format
    - Linters: (black, ruff, eslint; use uvx for Python: uvx ruff check --fix ., uvx black .)
    - Formatters: (black, prettier)
    - Config paths and key options

    Output the COMPLETE document.
  expected_output: >
    Full exploration with ## Lint & Format section.
  agent: convention_extractor
  context: [test_layout_task]

api_boundary_scout_task:
  description: >
    Map API surface when relevant. You receive the full exploration.

    Context:
    {repo_context}

    Task: {task}

    If task does NOT mention "API", "endpoint", "route", "REST", "controller",
    append "## API Boundary\nSkipped (task does not mention API)."

    Otherwise use Repo Shell Tool:
    - grep -r "urlpatterns\|router\|@app\.\|routes\|Route" in relevant paths --exclude-dir=node_modules --exclude-dir=.git | head -50
    - find . --maxdepth 4 -name "routes*.py" -o -name "*controller*" -o -name "*api*" | head -20
    - cat main router files
    
    IMPORTANT - Always limit command output:
    - grep: always use --exclude-dir and | head -N
    - find: always use --maxdepth and | head -N

    APPEND:
    ## API Boundary
    - Routes/endpoints structure
    - Where to add new endpoints

    Output the COMPLETE document.
  expected_output: >
    Full exploration with ## API Boundary section.
  agent: api_boundary_scout
  context: [convention_extract_task]
