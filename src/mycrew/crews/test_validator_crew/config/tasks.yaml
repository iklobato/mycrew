test_implement_task:
  description: >
    Write tests for the implementation.
    
    Context: {repo_context}
    
    Plan: {plan}
    Implementation: {implementation}
    Exploration (Test Layout): {exploration}
    
    If test_command is empty, output "Test writing skipped (no test_command)."
    
    Otherwise:
    1. Read the plan to identify files that need tests
    2. Check exploration for test patterns and conventions
    3. Write tests using Repo File Writer Tool
    4. Follow project test patterns
    
    Output "Tests written: [list of files with test counts]".
  expected_output: >
    List of test files written with test counts, or skip message.
  agent: test_implementer

test_quality_check_task:
  description: >
    Validate test quality by injecting bugs.
    
    Context: {repo_context}
    
    Use the output from the previous task (test_implement_task) for test files written.
    Implementation: {implementation}
    
    CRITICAL: You MUST validate tests catch bugs:
    
    1. Create backup of implementation files
    2. Inject a deliberate bug (change logic, remove checks, etc.)
    3. Run test_command — tests MUST fail
    4. Restore original implementation
    
    If tests don't fail, improve tests and repeat.
    
    Output "Test validation: PASS" or "Test validation: FAIL - [reason]".
  expected_output: >
    Test validation result with PASS/FAIL status.
  agent: test_quality_checker
  context: [test_implement_task]

test_coverage_check_task:
  description: >
    Check test coverage if tools available.
    
    Context: {repo_context}
    
    Use the output from the previous task (test_quality_check_task) for test validation status.
    
    Optional: Check for coverage tools and run them.
    
    If coverage tools available (pytest --cov, jest --coverage, etc.):
    1. Run coverage command
    2. Parse coverage percentage
    3. Check if >= 80%
    
    If no coverage tools, skip.
    
    Output "Coverage: X% (PASS)" or "Coverage: X% (FAIL)" or skip message.
  expected_output: >
    Coverage status with percentage, or skip message.
  agent: test_coverage_checker
  context: [test_quality_check_task]
