ambiguity_detect_task:
  description: >
    List potential ambiguities. Do NOT ask the human.

    Task: {task}
    Issue analysis: {issue_analysis}
    Exploration: {exploration}

    Cross-reference and list open questions:
    - File/module ownership
    - Convention conflicts
    - Scope boundaries
    - Test strategy
    - Migration/compatibility

    Output:
    ## Open Questions
    1. (question, file/context)
    2. (question, file/context)
    ...

    No ask_human. Just the list.
  expected_output: >
    ## Open Questions section with numbered list.
  agent: ambiguity_detector

question_prioritize_task:
  description: >
    Rank the open questions by impact. You receive the list from ambiguity_detect_task.

    Impact = wrong assumption would cause major rework. Rank 1 = highest impact.

    Output:
    ## Prioritized Questions
    1. (highest impact): <question>
    2. (next): <question>
    ...
  expected_output: >
    ## Prioritized Questions with impact ranking.
  agent: question_prioritizer
  context: [ambiguity_detect_task]

clarify_task:
  description: >
    You are running the CLARIFY phase. You have a prioritized list of questions.
    Ask the human using ask_human for each, starting with highest impact.

    ## Task description
    {task}

    ## Structured issue analysis
    {issue_analysis}

    ## Codebase exploration results
    {exploration}

    ## Prioritized Questions (from previous task — ask in this order)
    Use the context from question_prioritize_task. Ask high-impact questions first.

    ## Your process

    1. Read all three inputs carefully — task, requirements, and exploration results.
    2. Cross-reference: look for tensions between what the spec asks for and what the
       codebase currently looks like. Flag anything that could cause the architect to
       make a wrong assumption. Focus on:
       - **File/module ownership** — the spec touches an area that has multiple candidate
         locations (e.g., two versions of a module, a legacy and a new path)
       - **Convention conflicts** — the spec implies a pattern that doesn't match what
         the explorer found (e.g., spec says "add a new endpoint" but the router style
         differs from what was found)
       - **Scope boundaries grounded in the repo** — e.g., "should I touch `auth/legacy.py`
         or only `auth/core.py`?"
       - **Test strategy for this specific codebase** — e.g., "the explorer found no tests
         for module X — should I add them or leave testing out of scope?"
       - **Migration or compatibility concerns** — e.g., "there are two DB schema versions
         in the repo — which one should the new feature target?"
       - **Development guidelines** — any preferences on how to implement, what to avoid,
         what patterns to follow or not follow based on what you see in the codebase
    3. For each open question, call ask_human with ONE focused question.
       **ask_human** — Param: question (str). One question per call. Returns human answer.
       The question string you pass is the ONLY thing the human sees — it MUST include
       the full question plus Option A, Option B (and Option C/D if needed), each with
       a code snippet in ```language format. Never ask a bare question without options.
       Always ground the question in something specific you found in the exploration
       (mention the file, pattern, or convention you're referring to).
       You MUST include 2–4 concrete answer options. Order them from top
       recommendation to last (best option first, least preferred last).
       For each option, include an example code snippet (max 20 lines). Format each
       snippet with markdown code fences. Use the correct language (python, typescript,
       javascript, etc.) based on the codebase. Keep snippets concise — show structure,
       imports, or key patterns, not full implementations.
        Example CORRECT format - copy this EXACTLY:
          Q: Which OAuth provider should we use?
          Option A (recommended): Use Google OAuth
          ```python
          from google.oauth2 import id_token
          ```
          Option B: Use GitHub OAuth
          ```python
          from github import Github
          ```
        
        CRITICAL - YOUR QUESTION MUST START WITH "Q:" ON THE FIRST LINE:
        - Use "Q:" followed by your question (NO ## or **bold**)
        - Use "Option A:", "Option B:", etc. on SEPARATE lines
        - Code blocks MUST have newlines: ```python\ncode\n```
        - NEVER use: ## header, **bold**, A) B) C), or anything else
        
        WRONG Examples (DO NOT USE):
          ## OAuth Provider ...WRONG
          **Options:** ...WRONG
          A) Google ...WRONG
          Option A (recommended): Use Google ```python code``` ...WRONG
    4. Based on the answers, decide if follow-ups are needed. Keep asking until
       you have no remaining open assumptions.
    5. Do NOT ask about things already clearly answered in the issue analysis.
    6. Do NOT ask generic questions that ignore the exploration findings.
    7. Do NOT ask more than one question per tool call.

    ## Output format

    Produce a structured Clarifications & Development Guidelines document.
    Each ask_human question must include Option A, Option B, etc. with code snippets
    (see example in step 3).

    ```
    # Clarifications & Development Guidelines

    ## Module / File Ownership
    Q: <your question with code snippets per option>
    A: <human answer>

    ## Conventions & Patterns
    Q: ...
    A: ...

    ## Test Strategy
    Q: ...
    A: ...

    ## Scope Boundaries
    Q: ...
    A: ...

    ## Development Guidelines
    (any constraints or preferences stated by the human that are not a direct Q&A)
    - ...

    (include only sections where you actually asked questions or received guidelines)
    ```

    Start your first question now using the ask_human tool.
  expected_output: >
    A structured Clarifications & Development Guidelines document in Markdown.
    Every question must reference a specific file, pattern, or finding from the exploration.
    Every option in a question must include an example code snippet (max 20 lines) in
    ```language format for readability. Every answer must be recorded verbatim.
    This document is the authoritative source of truth for the architect —
    it overrides any assumptions the architect might otherwise make.
  agent: clarifier
  context: [question_prioritize_task]
