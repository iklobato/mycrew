# Central Tool Registry
# Used by all agents - provides consistent tool descriptions
# No code changes needed - reference in agent backstories

tools:
  repo_shell:
    description: Execute safe shell commands in the repository
    purpose: Read files, list directories, run git/test/lint commands
    safe_commands:
      read: [cat, head, tail, grep, find, wc, less]
      git: [git status, git diff, git log, git branch, git checkout, git add]
      run: [python, pip, pytest, ruff, black, npm, yarn, go]
      list: [ls, ls -la, tree, find, dir]
    blocked_commands:
      - "rm -rf /"
      - "rm -rf .git"
      - "dd"
      - "mkfs"
      - ":(){:|:&};"
    examples:
      - description: Read a Python file
        command: "cat src/auth/jwt.py"
      - description: Find test files
        command: "find . -name 'test_*.py' -type f"
      - description: Check git status
        command: "git status --porcelain"
      - description: Run tests
        command: "pytest tests/ -v"

  repo_file_writer:
    description: Create new files or modify existing files in the repository
    purpose: Write code, create files, update content
    creates_directories: true
    parameters:
      path: "Relative path from repo root (e.g., src/auth/jwt.py)"
      content: "Full file content"
      overwrite: "true for existing files, false for new files"
    examples:
      - description: Create new Python module
        params: {path: "src/new_module.py", content: "def hello(): pass", overwrite: false}
      - description: Modify existing file
        params: {path: "src/auth.py", content: "...", overwrite: true}

  serper_dev:
    description: Web search via Serper API
    purpose: Research best practices, patterns, solutions, validate approaches
    requires_env: SERPER_API_KEY
    rate_limit: "~100 searches/day (free tier)"
    examples:
      - description: Research best practices
        query: "[Technology] best practices implementation"
      - description: Find patterns
        query: "[Framework] common patterns"

  github_search:
    description: Semantic search over GitHub code repositories
    purpose: Find similar implementations, understand patterns, research code
    requires_env: GITHUB_TOKEN
    examples:
      - description: Find similar code
        query: "JWT authentication implementation"
        repo: "owner/repo"

  scrape_website:
    description: Fetch and parse content from URLs
    purpose: Read GitHub issues, PRs, documentation, external resources
    rate_limit: "~10 requests/minute"
    examples:
      - description: Read GitHub issue
        url: "https://github.com/owner/repo/issues/123"
      - description: Fetch documentation
        url: "https://docs.example.com/api"

  code_interpreter:
    description: Execute code in isolated Docker container
    purpose: Run tests, validate syntax, execute code snippets
    requires: Docker running and accessible
    examples:
      - description: Run pytest
        command: "pytest tests/ -v"
      - description: Validate Python syntax
        command: "python -m py_compile src/module.py"

  create_pr:
    description: Create GitHub Pull Request
    purpose: Publish changes for team review and merge
    requires_env: GITHUB_TOKEN
    parameters:
      title: "PR title"
      body: "PR description (markdown supported)"
      base: "Target branch (default: main)"

  ask_human:
    description: Ask human collaborator questions with options
    purpose: Resolve ambiguities, confirm approaches, make decisions
    is_blocking: true
    examples:
      - description: Ask about approach
        question: "Which approach?"
        options: ["A) Option A", "B) Option B", "C) Option C"]

  noop_tool:
    description: Fallback tool when optional tools are unavailable
    purpose: Placeholder for optional tools not configured
    always_available: true
